version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent local node_modules from overriding the container's
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - shared_media:/tmp/media
      - ./gcp-key.json:/app/gcp-key.json:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
    restart: unless-stopped

volumes:
  shared_media:
    driver: local
